<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보유지분가치/시가총액 비율 대시보드</title>
<script>
try {
  const theme = localStorage.getItem('theme') || 'light';
  document.documentElement.dataset.theme = theme === 'dark' ? 'dark' : 'light';
} catch (e) {
  document.documentElement.dataset.theme = 'light';
}
</script>
<style>
:root {
  color-scheme: dark;
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2e3345;
  --text: #e4e7f1;
  --text-dim: #8b90a5;
  --accent: #6c8cff;
  --up: #f0615e;
  --down: #4a90d9;
  --green: #38c96a;
  --warn: #f5a623;
  --grid: rgba(255,255,255,0.06);
  --warn-line: rgba(245,166,35,0.5);
  --warn-text: rgba(245,166,35,0.7);
  --today-bg: linear-gradient(135deg, rgba(108,140,255,0.12), rgba(56,201,106,0.08));
  --today-border: rgba(108,140,255,0.35);
  --overview-card-bg: rgba(15,17,23,0.38);
  --overview-card-hover-bg: rgba(15,17,23,0.54);
  --overview-card-active-bg: rgba(108,140,255,0.1);
  --overview-card-border: rgba(255,255,255,0.08);
  --overview-primary-bg: rgba(15,17,23,0.26);
  --overview-primary-border: rgba(56,201,106,0.28);
  --soft-border: rgba(255,255,255,0.08);
  --avg-card-bg: rgba(56,201,106,0.06);
  --avg-card-bg-active: rgba(56,201,106,0.12);
  --avg-line: rgba(108,140,255,0.3);
  --avg-text: rgba(108,140,255,0.6);
  --sma-line: rgba(56,201,106,0.95);
  --ema-line: rgba(245,166,35,0.95);
  --ratio-fill-start: rgba(108,140,255,0.25);
  --ratio-fill-end: rgba(108,140,255,0);
  --price-up-fill-start: rgba(240,97,94,0.25);
  --price-up-fill-end: rgba(240,97,94,0);
  --price-down-fill-start: rgba(74,144,217,0.25);
  --price-down-fill-end: rgba(74,144,217,0);
}
:root[data-theme="light"] {
  color-scheme: light;
  --bg: #f5f7fb;
  --surface: #ffffff;
  --surface2: #eef3fb;
  --border: #d5ddea;
  --text: #1d2738;
  --text-dim: #66758c;
  --accent: #2d66d6;
  --up: #d1433f;
  --down: #2a78c9;
  --green: #1f9b57;
  --warn: #b7791f;
  --grid: rgba(29,39,56,0.08);
  --warn-line: rgba(183,121,31,0.45);
  --warn-text: rgba(183,121,31,0.8);
  --today-bg: linear-gradient(135deg, rgba(45,102,214,0.1), rgba(31,155,87,0.08));
  --today-border: rgba(45,102,214,0.28);
  --overview-card-bg: rgba(255,255,255,0.82);
  --overview-card-hover-bg: rgba(241,245,255,0.98);
  --overview-card-active-bg: rgba(45,102,214,0.12);
  --overview-card-border: rgba(29,39,56,0.1);
  --overview-primary-bg: rgba(255,255,255,0.9);
  --overview-primary-border: rgba(31,155,87,0.28);
  --soft-border: rgba(29,39,56,0.1);
  --avg-card-bg: rgba(31,155,87,0.07);
  --avg-card-bg-active: rgba(31,155,87,0.14);
  --avg-line: rgba(45,102,214,0.28);
  --avg-text: rgba(45,102,214,0.72);
  --sma-line: rgba(31,155,87,0.95);
  --ema-line: rgba(183,121,31,0.95);
  --ratio-fill-start: rgba(45,102,214,0.2);
  --ratio-fill-end: rgba(45,102,214,0);
  --price-up-fill-start: rgba(209,67,63,0.18);
  --price-up-fill-end: rgba(209,67,63,0);
  --price-down-fill-start: rgba(42,120,201,0.18);
  --price-down-fill-end: rgba(42,120,201,0);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}
.header {
  padding: 24px 32px 16px;
  border-bottom: 1px solid var(--border);
}
.header-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.header .updated {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 4px;
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}
.refresh-btn {
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  padding: 8px 14px;
  border-radius: 999px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.refresh-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}
.refresh-btn.is-refreshing,
.refresh-btn:disabled {
  cursor: wait;
  color: var(--text);
  border-color: var(--accent);
  background: var(--surface2);
}
.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  min-height: 38px;
  padding: 8px 14px;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.theme-toggle:hover {
  border-color: var(--accent);
  color: var(--text);
  background: var(--surface2);
}
.theme-toggle:focus-visible,
.refresh-btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 32px;
}

/* Today overview */
.today-overview {
  margin-bottom: 18px;
  padding: 22px;
  border: 1px solid var(--today-border);
  border-radius: 18px;
  background:
    radial-gradient(circle at 78% 10%, rgba(108,140,255,0.16), transparent 34%),
    radial-gradient(circle at 18% 92%, rgba(56,201,106,0.1), transparent 30%),
    var(--today-bg);
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
}
.today-overview-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 18px;
}
.today-overview-title-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.today-overview-kicker {
  color: var(--accent);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.04em;
}
.today-overview-title {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.8px;
  line-height: 1.05;
}
.today-overview-meta {
  color: var(--text-dim);
  font-size: 12px;
  text-align: right;
  line-height: 1.5;
}
.today-overview-grid {
  display: grid;
  grid-template-columns: 1.08fr 1fr 1.08fr 1.08fr;
  gap: 12px;
  align-items: stretch;
}
.overview-card {
  min-height: 206px;
  padding: 16px;
  border: 1px solid var(--overview-card-border);
  border-radius: 14px;
  background: var(--overview-card-bg);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 8px;
  overflow: hidden;
}
.overview-card.primary {
  background: var(--overview-primary-bg);
  border-color: var(--overview-primary-border);
}
.overview-card.average-card {
  align-items: stretch;
}
.overview-card.average-card .overview-value {
  font-size: 38px;
  line-height: 1;
}
.average-card-body {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(96px, 132px);
  align-items: center;
  gap: 14px;
}
.average-main-metric {
  min-width: 0;
}
.average-sparkline {
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.average-sparkline-label {
  margin-bottom: 5px;
  color: var(--text-dim);
  font-size: 11px;
  line-height: 1;
  text-align: right;
}
.average-sparkline svg {
  display: block;
  width: 100%;
  height: 56px;
}
.average-sparkline-fill {
  fill: var(--accent);
  opacity: 0.1;
}
.average-sparkline-line {
  fill: none;
  stroke: var(--accent);
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 2.4;
}
.average-sparkline.up .average-sparkline-fill { fill: var(--up); }
.average-sparkline.up .average-sparkline-line { stroke: var(--up); }
.average-sparkline.down .average-sparkline-fill { fill: var(--down); }
.average-sparkline.down .average-sparkline-line { stroke: var(--down); }
.average-sparkline.empty {
  min-height: 56px;
  align-items: flex-end;
  color: var(--text-dim);
  font-size: 11px;
}
.overview-card.clickable {
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s, background 0.15s;
}
.overview-card.clickable:hover {
  transform: translateY(-1px);
  border-color: var(--accent);
  background: var(--overview-card-hover-bg);
}
.overview-card.active {
  border-color: var(--accent);
  background: var(--overview-card-active-bg);
}
.overview-label {
  color: var(--text-dim);
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.overview-value {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1.05;
}
.overview-change {
  font-size: 14px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.overview-change.up { color: var(--up); }
.overview-change.down { color: var(--down); }
.overview-change.flat { color: var(--text-dim); }
.overview-detail,
.overview-points {
  color: var(--text-dim);
  font-size: 12px;
}
.overview-summary-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: auto;
}
.overview-stat {
  border-top: 1px solid var(--soft-border);
  padding-top: 10px;
}
.overview-stat-label {
  margin-bottom: 4px;
  color: var(--text-dim);
  font-size: 11px;
}
.overview-stat-value {
  font-size: 15px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}
.overview-stat-value.up { color: var(--up); }
.overview-stat-value.down { color: var(--down); }
.overview-stat-value.flat { color: var(--text-dim); }
.overview-split {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 148px;
  gap: 12px;
  align-items: start;
}
.overview-split.no-side {
  grid-template-columns: minmax(0, 1fr);
}
.overview-split.market {
  grid-template-columns: minmax(0, 1fr) minmax(120px, 0.72fr);
}
.overview-split.runners {
  grid-template-columns: minmax(0, 1fr) 148px;
}
.overview-split.runners.no-side {
  grid-template-columns: minmax(0, 1fr);
}
.overview-main-copy {
  min-width: 0;
}
.market-main {
  min-width: 0;
}
.market-card {
  justify-content: flex-start;
}
.market-headline {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
}
.market-row-list {
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-top: 8px;
  padding-top: 10px;
  border-top: 1px solid var(--soft-border);
}
.market-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto auto;
  align-items: baseline;
  gap: 8px;
  min-width: 0;
}
.market-row-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text-dim);
  font-size: 11px;
}
.market-row-value {
  white-space: nowrap;
  font-size: 13px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}
.market-row-change {
  white-space: nowrap;
  font-size: 11px;
  font-variant-numeric: tabular-nums;
}
.market-row-change.up { color: var(--up); }
.market-row-change.down { color: var(--down); }
.market-row-change.flat { color: var(--text-dim); }
.market-summary {
  margin-top: auto;
}
.market-summary .overview-stat-value {
  font-size: 13px;
}
.overview-side-list,
.overview-rank-list {
  border-left: 1px solid var(--soft-border);
  padding-left: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 0;
}
.overview-mini-item {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.overview-mini-label {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text-dim);
  font-size: 11px;
}
.overview-mini-data {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: baseline;
  gap: 8px;
}
.overview-mini-value {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 14px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}
.overview-mini-change {
  font-size: 11px;
  white-space: nowrap;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.overview-mini-change.up { color: var(--up); }
.overview-mini-change.down { color: var(--down); }
.overview-mini-change.flat { color: var(--text-dim); }
.leader-ratio-block {
  margin-top: 12px;
}
.leader-ratio-block .ratio-val {
  font-size: 30px;
  line-height: 1;
}
.leader-ratio-block .ratio-change {
  display: block;
  margin-top: 7px;
}
.overview-rank-item {
  appearance: none;
  width: 100%;
  padding: 1px 0;
  border: none;
  background: transparent;
  color: inherit;
  cursor: pointer;
  font: inherit;
  text-align: left;
  transition: color 0.15s, transform 0.15s;
}
.overview-rank-item:hover,
.overview-rank-item.active {
  color: var(--accent);
  transform: translateX(1px);
}
.overview-rank-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 11.5px;
  font-weight: 700;
  line-height: 1.2;
}
.overview-rank-value {
  color: var(--text-dim);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
}
.overview-rank-meta {
  display: flex;
  align-items: baseline;
  gap: 5px;
  color: var(--text-dim);
  font-size: 10.5px;
  flex-wrap: wrap;
}

/* Summary cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  cursor: pointer;
  min-height: 198px;
  display: flex;
  flex-direction: column;
  transition: transform 0.15s, border-color 0.15s, background 0.15s, box-shadow 0.15s;
}
.card:hover {
  transform: translateY(-1px);
  border-color: var(--accent);
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}
.card.avg-card { border-color: var(--green); background: var(--avg-card-bg); }
.card.avg-card.active { border-color: var(--green); background: var(--avg-card-bg-active); }
.card.active {
  border-color: var(--accent);
  background: var(--surface2);
}
.card .name,
.overview-card .name {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ratio-line {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
}
.card .ratio-val,
.overview-card .ratio-val {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -1px;
  font-variant-numeric: tabular-nums;
}
.card .ratio-change,
.overview-card .ratio-change {
  font-size: 13px;
  font-weight: 700;
  margin-top: 2px;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.card .ratio-change.up,
.overview-card .ratio-change.up { color: var(--up); }
.card .ratio-change.down,
.overview-card .ratio-change.down { color: var(--down); }
.card .ratio-change.flat,
.overview-card .ratio-change.flat { color: var(--text-dim); }
.card .prices {
  margin-top: 12px;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.price-line {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 8.2ch 7ch 9.4ch;
  align-items: baseline;
  column-gap: 4px;
}
.price-label {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.2;
}
.price-value {
  text-align: right;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.price-change {
  display: inline-block;
  text-align: right;
}
.price-meta {
  display: contents;
}
.price-suffix {
  color: var(--green);
  font-size: 11px;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: right;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.card .amounts {
  margin-top: auto;
  padding-top: 8px;
  border-top: 1px solid var(--soft-border);
  font-size: 11px;
  color: var(--text-dim);
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 3px 8px;
  font-variant-numeric: tabular-nums;
}
.amount-label {
  white-space: nowrap;
}
.amount-value {
  text-align: right;
  white-space: nowrap;
}

/* Chart area */
.chart-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 24px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.08);
}
.chart-section.featured-chart {
  padding: 24px;
}
.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}
.chart-header-main {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.chart-title {
  font-size: 17px;
  font-weight: 600;
}
.chart-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 12px;
  min-height: 18px;
}
.chart-legend:empty {
  min-height: 0;
}
.chart-legend-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-dim);
}
.legend-swatch {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  display: inline-block;
  flex-shrink: 0;
}
.period-btns {
  display: flex;
  gap: 4px;
}
.period-btns button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
.period-btns button:hover { border-color: var(--accent); color: var(--text); }
.period-btns button.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.chart-container {
  position: relative;
  width: 100%;
  height: 380px;
}
.ratio-chart-container {
  height: 520px;
}
.price-chart-container {
  height: 330px;
}
canvas { display: block; }
.data-zoom {
  margin-top: 14px;
  display: grid;
  gap: 7px;
}
.data-zoom-track {
  position: relative;
  height: 38px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background:
    repeating-linear-gradient(90deg, transparent 0, transparent calc(20% - 1px), var(--grid) calc(20% - 1px), var(--grid) 20%),
    linear-gradient(180deg, var(--surface2), var(--surface));
  overflow: hidden;
  cursor: crosshair;
  touch-action: none;
}
.data-zoom-selection {
  position: absolute;
  top: 5px;
  bottom: 5px;
  min-width: 20px;
  border: 1px solid var(--accent);
  border-radius: 7px;
  background: linear-gradient(180deg, var(--ratio-fill-start), var(--ratio-fill-end));
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 4px 16px rgba(0,0,0,0.12);
  cursor: grab;
}
.data-zoom-selection.dragging {
  cursor: grabbing;
}
.data-zoom-handle {
  position: absolute;
  top: 50%;
  width: 12px;
  height: 22px;
  border: 1px solid var(--accent);
  border-radius: 999px;
  background: var(--surface);
  transform: translateY(-50%);
  box-shadow: 0 2px 8px rgba(0,0,0,0.14);
  cursor: ew-resize;
}
.data-zoom-handle.left { left: -6px; }
.data-zoom-handle.right { right: -6px; }
.data-zoom-labels {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-dim);
}
.data-zoom-labels span:nth-child(2) {
  color: var(--text);
  font-weight: 600;
}
.data-zoom-labels span:last-child {
  text-align: right;
}
.data-zoom.disabled {
  opacity: 0.45;
  pointer-events: none;
}

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.stat-box .label {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stat-box .value {
  font-size: 20px;
  font-weight: 700;
}

/* Comparison table */
.table-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.table-section h2 {
  font-size: 17px;
  font-weight: 600;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
th {
  text-align: left;
  padding: 10px 16px;
  font-weight: 600;
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
tr:last-child td { border-bottom: none; }
tr:hover { background: var(--surface2); }
.up-color { color: var(--up); }
.down-color { color: var(--down); }
.flat-color { color: var(--text-dim); }
.price-change {
  margin-left: 4px;
  font-size: 11px;
  font-weight: 600;
}

/* Bar in table */
.bar-cell {
  display: flex;
  align-items: center;
  gap: 8px;
}
.bar {
  height: 8px;
  border-radius: 4px;
  background: var(--accent);
  transition: width 0.3s;
}

/* Tooltip */
.tooltip {
  position: absolute;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 10;
  min-width: 200px;
}
.tooltip.visible { opacity: 1; }
.tooltip .tt-date { color: var(--text-dim); margin-bottom: 6px; }
.tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; }

@media (max-width: 768px) {
  .header, .container { padding-left: 16px; padding-right: 16px; }
  .header-row { flex-direction: column; align-items: stretch; }
  .header-actions { justify-content: flex-start; }
  .today-overview { padding: 14px; }
  .today-overview-head { flex-direction: column; align-items: flex-start; }
  .today-overview-meta { text-align: left; }
  .today-overview-title { font-size: 20px; }
  .today-overview-grid { grid-template-columns: minmax(0, 1fr); }
  .average-card-body { grid-template-columns: minmax(0, 1fr); }
  .average-sparkline-label { text-align: left; }
  .overview-split,
  .overview-split.market,
  .overview-split.runners { grid-template-columns: minmax(0, 1fr); }
  .overview-side-list,
  .overview-rank-list {
    border-left: none;
    border-top: 1px solid var(--soft-border);
    padding-left: 0;
    padding-top: 10px;
  }
  .cards { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
  .chart-section.featured-chart { padding: 18px; }
  .chart-container { height: 280px; }
  .ratio-chart-container { height: 360px; }
  .price-chart-container { height: 260px; }
  .data-zoom-labels { grid-template-columns: 1fr 1fr; }
  .data-zoom-labels span:nth-child(2) { display: none; }
}

@media (min-width: 769px) and (max-width: 1180px) {
  .today-overview-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
</style>
</head>

<script src="data.js"></script>

<script>
window.CURRENT_DATA = typeof CURRENT_DATA === 'undefined' ? null : CURRENT_DATA;
</script>
<script>
(function() {
  const pairs = STOCK_DATA.pairs;
  const queryParams = new URLSearchParams(location.search);
  const initialCode = (queryParams.get('code') || '').trim();
  const holdingCodeById = buildHoldingCodeMapFromPairs();
  const REFRESH_INTERVAL_MS = 300 * 1000;
  const LIVE_REFRESH_MAX_AGE_MS = 60 * 1000;
  const LIVE_REFRESH_RETRY_DELAY_MS = 1500;
  const LIVE_REFRESH_RETRY_ATTEMPTS = 2;
  const LIVE_REFRESH_FORCE_ATTEMPTS = 1;
  const LIVE_FETCH_TIMEOUT_MS = 7000;
  const LIVE_REFRESH_TIMEOUT_MS = 45000;
  const LIVE_PROXY_URL = 'https://api.codetabs.com/v1/proxy?quest=';
  const KIS_PROXY_BASE_URL = 'http://cantabile.tplinkdns.com:3288';
  const KIS_PROXY_BATCH_CONCURRENCY = 4;
  const KIS_PROXY_LAUNCH_INTERVAL_MS = 60;
  const MIN_ZOOM_SPAN = 0.04;
  let holdingCodePromise = null;
  let holdingConfigPromise = null;
  let holdingConfigById = null;
  let hasRendered = false;
  let selectedIdx = getInitialSelectedIdx();
  let periodDays = 0; // 0 = all
  let pricePeriodDays = 0;
  const ratioZoom = createZoomState();
  const priceZoom = createZoomState();
  let refreshInFlight = false;
  let latestSnapshotVersion = getSnapshotVersion(window.CURRENT_DATA) || getSnapshotVersion(STOCK_DATA);
  let latestAppliedSnapshotMs = latestSnapshotVersion || 0;
  let lastRefreshStartedAt = 0;
  let liveRefreshPromise = null;
  let todayOverviewData = null;

  applyTheme(loadTheme(), false);

  // --- Apply live data ---
  applyCurrentData();
  sortPairsByCurrentRatio();
  todayOverviewData = buildTodaySummary();

  // --- Init ---
  updateLastUpdatedText();
  renderTodayOverview();
  renderCards();
  renderTable();
  renderChart();
  renderPriceChart();
  renderStats();
  hasRendered = true;
  bindPeriodBtns();
  bindPricePeriodBtns();
  bindDataZoomControls();
  bindRefreshButton();
  bindThemeToggle();
  resolveSelectionFromQuery();

  // --- Auto-refresh ---
  bindAutoRefresh();
  refreshCurrentPrices();

  function applyCurrentData(snapshot) {
    const currentData = snapshot || window.CURRENT_DATA;
    if (!currentData) return false;
    const incomingVersion = getSnapshotVersion(currentData);
    if (incomingVersion && latestAppliedSnapshotMs && incomingVersion < latestAppliedSnapshotMs) {
      return false;
    }
    const currentMap = {};
    for (const p of currentData.pairs || []) {
      currentMap[p.id] = p;
    }
    const today = (currentData.lastUpdated || STOCK_DATA.lastUpdated || '').slice(0, 10);
    for (const pair of pairs) {
      const live = currentMap[pair.id];
      if (!live) continue;
      const lastHist = pair.history.length > 0 ? pair.history[pair.history.length - 1] : null;
      pair.current.ratio = live.ratio;
      pair.current.ratioChange = live.ratioChange !== undefined && live.ratioChange !== null
        ? live.ratioChange
        : lastHist ? +(live.ratio - lastHist.ratio).toFixed(2) : 0;
      if (!pair.isAverage) {
        pair.current.holdingPrice = live.holdingPrice;
        if (live.holdingChange !== undefined) {
          pair.current.holdingChange = live.holdingChange;
        }
        pair.current.holdingValue = live.holdingValue;
        pair.current.marketCap = live.marketCap;
        if (live.subsidiaryPrice !== undefined) {
          pair.current.subsidiaryPrice = live.subsidiaryPrice;
        }
        if (live.subsidiaryChange !== undefined) {
          pair.current.subsidiaryChange = live.subsidiaryChange;
        }
        if (live.subsidiaries) {
          pair.current.subsidiaries = live.subsidiaries;
        }
      }
      upsertTodayHistory(pair, live, today);
    }
    if (currentData.lastUpdated) {
      STOCK_DATA.lastUpdated = currentData.lastUpdated;
    }
    window.CURRENT_DATA = currentData;
    latestAppliedSnapshotMs = incomingVersion || Date.now();
    latestSnapshotVersion = Math.max(latestSnapshotVersion || 0, latestAppliedSnapshotMs || 0);
    todayOverviewData = buildTodaySummary(currentData);
    return true;
  }

  async function refreshCurrentPrices(opts) {
    opts = opts || {};
    const manual = !!opts.manual;

    if (!manual && document.visibilityState !== 'visible') {
      return false;
    }
    if (refreshInFlight) {
      return false;
    }

    refreshInFlight = true;
    lastRefreshStartedAt = Date.now();
    updateRefreshButton();

    try {
      let baseSnapshot = {
        lastUpdated: STOCK_DATA.lastUpdated,
        snapshotTimestamp: latestAppliedSnapshotMs || getSnapshotVersion(STOCK_DATA),
      };

      try {
        const res = await fetch('current.js?t=' + Date.now(), { cache: 'no-store' });
        if (res.ok) {
          const text = await res.text();
          const json = text.replace(/^const CURRENT_DATA\s*=\s*/, '').replace(/;\s*$/, '');
          const nextSnapshot = JSON.parse(json);
          if (applyCurrentData(nextSnapshot)) {
            baseSnapshot = nextSnapshot;
          }
        }
      } catch (err) {
        console.warn('current.js 로드 실패:', err);
      }

      await refreshLivePricesWithRetry(
        baseSnapshot,
        manual ? LIVE_REFRESH_FORCE_ATTEMPTS : LIVE_REFRESH_RETRY_ATTEMPTS,
        { forceRefresh: manual },
      );

      renderAll();
      return true;
    } catch (err) {
      console.warn('현재가 갱신 실패:', err);
      return false;
    } finally {
      refreshInFlight = false;
      updateRefreshButton();
    }
  }

  function bindAutoRefresh() {
    setTimeout(function tick() {
      refreshCurrentPrices().finally(function() {
        setTimeout(tick, REFRESH_INTERVAL_MS);
      });
    }, REFRESH_INTERVAL_MS);

    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState !== 'visible') return;
      if (Date.now() - lastRefreshStartedAt < REFRESH_INTERVAL_MS / 3) return;
      refreshCurrentPrices();
    });
  }

  function bindRefreshButton() {
    var button = document.getElementById('refreshBtn');
    if (!button) return;
    button.addEventListener('click', function() {
      refreshCurrentPrices({ manual: true });
    });
    updateRefreshButton();
  }

  function updateRefreshButton() {
    var button = document.getElementById('refreshBtn');
    if (!button) return;
    button.disabled = refreshInFlight;
    button.classList.toggle('is-refreshing', refreshInFlight);
    button.textContent = refreshInFlight ? '새로고침 중...' : '새로고침';
  }

  function updateLastUpdatedText() {
    var parts = ['최종 업데이트: ' + STOCK_DATA.lastUpdated];
    if (window.CURRENT_DATA && window.CURRENT_DATA.isPartial) {
      var preserved = (window.CURRENT_DATA.preservedPairIds || []).length;
      var missing = (window.CURRENT_DATA.missingPairIds || []).length;
      if (preserved > 0) {
        parts.push('일부 종목은 직전 정상값 유지');
      }
      if (missing > 0) {
        parts.push('미반영 종목 ' + missing + '개');
      }
    }
    document.getElementById('lastUpdated').textContent = parts.join(' · ');
  }

  function getSnapshotVersion(snapshot) {
    if (!snapshot) return 0;
    if (typeof snapshot.snapshotTimestamp === 'number') return snapshot.snapshotTimestamp;
    if (typeof snapshot.generatedAt === 'string') {
      var generated = Date.parse(snapshot.generatedAt);
      if (!Number.isNaN(generated)) return generated;
    }
    return parseSeoulTimestamp(snapshot.lastUpdated || '');
  }

  function parseSeoulTimestamp(value) {
    var match = /^(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2})$/.exec(value);
    if (!match) return 0;
    return Date.UTC(
      Number(match[1]),
      Number(match[2]) - 1,
      Number(match[3]),
      Number(match[4]) - 9,
      Number(match[5]),
      Number(match[6])
    );
  }

  function parseRawNumber(value) {
    if (value === null || value === undefined || value === '') return null;
    const parsed = parseFloat(String(value).replace(/,/g, ''));
    return Number.isNaN(parsed) ? null : parsed;
  }

  function formatKstTimestamp(date) {
    const kst = new Date(date.getTime() + 9 * 60 * 60 * 1000);
    return kst.toISOString().slice(0, 19).replace('T', ' ');
  }

  function sortPairsByCurrentRatio() {
    var selectedPairId = pairs[selectedIdx] ? pairs[selectedIdx].id : '';
    pairs.sort(comparePairOrder);
    if (!selectedPairId) return;
    var nextIdx = pairs.findIndex(function(pair) {
      return pair.id === selectedPairId;
    });
    if (nextIdx >= 0) {
      selectedIdx = nextIdx;
    }
  }

  function comparePairOrder(a, b) {
    if (a.isAverage) return b.isAverage ? 0 : -1;
    if (b.isAverage) return 1;
    if (b.current.ratio !== a.current.ratio) return b.current.ratio - a.current.ratio;
    return a.name.localeCompare(b.name, 'ko');
  }

  function getPriceChangeClass(change) {
    if (typeof change !== 'number' || !Number.isFinite(change)) return 'flat-color';
    if (change > 0) return 'up-color';
    if (change < 0) return 'down-color';
    return 'flat-color';
  }

  function formatPriceChange(change) {
    if (typeof change !== 'number' || !Number.isFinite(change)) return '';
    const normalized = Math.abs(change) < 0.005 ? 0 : change;
    const sign = normalized > 0 ? '+' : '';
    return sign + normalized.toFixed(2) + '%';
  }

  function renderPriceLine(label, price, change, suffix) {
    const changeText = formatPriceChange(change);
    const changeHtml = changeText
      ? `<span class="price-change ${getPriceChangeClass(change)}">${changeText}</span>`
      : '<span class="price-change flat-color">-</span>';
    const suffixText = suffix ? `<span class="price-suffix">${suffix}</span>` : '<span class="price-suffix"></span>';
    return `<div class="price-line">
      <span class="price-label">${escapeHtml(label)}</span>
      <span class="price-value">${formatPrice(price)}</span>
      <span class="price-meta">${changeHtml}${suffixText}</span>
    </div>`;
  }

  function renderPriceCell(price, change) {
    const changeText = formatPriceChange(change);
    if (!changeText) return formatPrice(price);
    return `${formatPrice(price)} <span class="price-change ${getPriceChangeClass(change)}">${changeText}</span>`;
  }

  function getDirectionClass(value) {
    if (typeof value !== 'number' || !Number.isFinite(value) || Math.abs(value) < 0.005) return 'flat';
    return value > 0 ? 'up' : 'down';
  }

  function formatSignedPercent(value) {
    if (typeof value !== 'number' || !Number.isFinite(value)) return '-';
    const normalized = Math.abs(value) < 0.005 ? 0 : value;
    const sign = normalized > 0 ? '+' : '';
    return sign + normalized.toFixed(2) + '%';
  }

  function formatSignedPoints(value) {
    if (typeof value !== 'number' || !Number.isFinite(value)) return '-';
    const normalized = Math.abs(value) < 0.005 ? 0 : value;
    const sign = normalized > 0 ? '+' : '';
    return sign + normalized.toFixed(2) + '%p';
  }

  function formatMarketNumber(value, decimals) {
    if (typeof value !== 'number' || !Number.isFinite(value)) return '-';
    return value.toLocaleString('ko-KR', {
      minimumFractionDigits: decimals,
      maximumFractionDigits: decimals,
    });
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function renderAll() {
    sortPairsByCurrentRatio();
    updateLastUpdatedText();
    renderTodayOverview();
    renderCards();
    renderTable();
    renderChart();
    renderPriceChart();
    renderStats();
  }

  function upsertTodayHistory(pair, live, today) {
    if (!today || !pair.history || !pair.history.length) return;
    if (pair.isAverage) {
      const averageEntry = { date: today, ratio: live.ratio };
      const lastAverage = pair.history[pair.history.length - 1];
      if (lastAverage && lastAverage.date === today) {
        Object.assign(lastAverage, averageEntry);
      } else {
        pair.history.push(averageEntry);
      }
      return;
    }
    const entry = {
      date: today,
      holdingPrice: live.holdingPrice,
      holdingValue: live.holdingValue,
      marketCap: live.marketCap,
      ratio: live.ratio,
    };
    if (live.subsidiaryPrice !== undefined) entry.subsidiaryPrice = live.subsidiaryPrice;
    if (live.subsidiaries) entry.subsidiaries = live.subsidiaries;

    const last = pair.history[pair.history.length - 1];
    if (last && last.date === today) {
      Object.assign(last, entry);
    } else {
      pair.history.push(entry);
    }
  }

  function buildTodaySummary(snapshot) {
    const livePairs = pairs.filter(function(pair) { return !pair.isAverage; });
    const avgPair = pairs.find(function(pair) { return pair.isAverage; });
    const ratioPairs = livePairs.filter(function(pair) {
      return typeof pair.current.ratio === 'number' && Number.isFinite(pair.current.ratio);
    });
    const changePairs = livePairs.filter(function(pair) {
      return typeof pair.current.ratioChange === 'number' && Number.isFinite(pair.current.ratioChange);
    });
    const holdingChangePairs = livePairs.filter(function(pair) {
      return typeof pair.current.holdingChange === 'number' && Number.isFinite(pair.current.holdingChange);
    });
    const subsidiaryChangePairs = livePairs.flatMap(function(pair) {
      if (Array.isArray(pair.current.subsidiaries)) {
        return pair.current.subsidiaries.map(function(sub) { return sub.change; });
      }
      return [pair.current.subsidiaryChange];
    }).filter(function(value) {
      return typeof value === 'number' && Number.isFinite(value);
    });
    const sortedByExpansion = changePairs.slice().sort(function(a, b) {
      return b.current.ratioChange - a.current.ratioChange;
    });
    const sortedByContraction = changePairs.slice().sort(function(a, b) {
      return a.current.ratioChange - b.current.ratioChange;
    });
    const averageRatio = avgPair && typeof avgPair.current.ratio === 'number'
      ? avgPair.current.ratio
      : ratioPairs.reduce(function(sum, pair) { return sum + pair.current.ratio; }, 0) / Math.max(1, ratioPairs.length);
    const averageRatioChange = avgPair && typeof avgPair.current.ratioChange === 'number'
      ? avgPair.current.ratioChange
      : changePairs.reduce(function(sum, pair) { return sum + pair.current.ratioChange; }, 0) / Math.max(1, changePairs.length);
    const averageHoldingChange = holdingChangePairs.reduce(function(sum, pair) {
      return sum + pair.current.holdingChange;
    }, 0) / Math.max(1, holdingChangePairs.length);
    const averageSubsidiaryChange = subsidiaryChangePairs.reduce(function(sum, value) {
      return sum + value;
    }, 0) / Math.max(1, subsidiaryChangePairs.length);
    const market = snapshot?.market || snapshot?.summary?.market || todayOverviewData?.market || null;

    return {
      source: snapshot?.source || inferSnapshotSource(snapshot) || todayOverviewData?.source || 'current.js',
      market,
      averageRatio,
      averageRatioChange,
      averageHoldingChange,
      averageSubsidiaryChange,
      representativeCount: ratioPairs.length,
      topExpansion: sortedByExpansion[0] || null,
      expansionRunners: sortedByExpansion.slice(1, 5),
      topContraction: sortedByContraction[0] || null,
      contractionRunners: sortedByContraction.slice(1, 5),
    };
  }

  function inferSnapshotSource(snapshot) {
    if (!snapshot || !Array.isArray(snapshot.pairs)) return '';
    const sources = [...new Set(snapshot.pairs.map(function(pair) { return pair.quoteSource; }).filter(Boolean))];
    if (!sources.length) return '';

    if (sources.includes('kis_openapi')) return '한국투자증권 Open API';
    if (sources.includes('yfinance')) return 'yfinance';
    return sources.join(', ');
  }

  function renderAverageSparkline() {
    const avgPair = pairs.find(function(pair) { return pair.isAverage; });
    const history = (avgPair?.history || [])
      .filter(function(row) { return typeof row.ratio === 'number' && Number.isFinite(row.ratio); })
      .slice(-18);
    if (history.length < 2) {
      return `<div class="average-sparkline empty">추이 데이터 대기</div>`;
    }

    const width = 128;
    const height = 56;
    const pad = 4;
    const values = history.map(function(row) { return row.ratio; });
    const min = Math.min(...values);
    const max = Math.max(...values);
    const span = max - min || 1;
    const points = values.map(function(value, idx) {
      const x = pad + (idx / (values.length - 1)) * (width - pad * 2);
      const y = pad + (1 - (value - min) / span) * (height - pad * 2);
      return [x.toFixed(1), y.toFixed(1)];
    });
    const line = points.map(function(point) { return point.join(','); }).join(' ');
    const area = [
      `${pad},${height - pad}`,
      line,
      `${width - pad},${height - pad}`,
    ].join(' ');
    const direction = values[values.length - 1] - values[0];
    const dir = getDirectionClass(direction);
    return `<div class="average-sparkline ${dir}">
      <div class="average-sparkline-label">최근 ${history.length}개 관측치</div>
      <svg viewBox="0 0 ${width} ${height}" aria-hidden="true">
        <polygon class="average-sparkline-fill" points="${area}"></polygon>
        <polyline class="average-sparkline-line" points="${line}"></polyline>
      </svg>
    </div>`;
  }

  function isSnapshotMsStale(snapshotMs) {
    return !snapshotMs || Date.now() - snapshotMs > LIVE_REFRESH_MAX_AGE_MS;
  }

  function delay(ms) {
    return new Promise(function(resolve) { setTimeout(resolve, ms); });
  }

  function withCacheBustingParam(url) {
    return url + (url.includes('?') ? '&' : '?') + 't=' + Date.now();
  }

  async function fetchWithTimeout(url, responseType, timeoutMs) {
    const controller = new AbortController();
    const timer = setTimeout(function() { controller.abort(); }, timeoutMs || LIVE_FETCH_TIMEOUT_MS);
    try {
      const resp = await fetch(LIVE_PROXY_URL + encodeURIComponent(withCacheBustingParam(url)), {
        signal: controller.signal,
        cache: 'no-store',
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return responseType === 'text' ? await resp.text() : await resp.json();
    } finally {
      clearTimeout(timer);
    }
  }

  async function runWithTimeout(task, timeoutMs, errorMessage) {
    let timer = null;
    try {
      return await Promise.race([
        task,
        new Promise(function(_, reject) {
          timer = setTimeout(function() { reject(new Error(errorMessage)); }, timeoutMs);
        }),
      ]);
    } finally {
      clearTimeout(timer);
    }
  }

  async function fetchKisProxyJson(path, timeoutMs) {
    return fetchWithTimeout(KIS_PROXY_BASE_URL + path, 'json', timeoutMs || LIVE_FETCH_TIMEOUT_MS);
  }

  async function mapWithRateLimit(items, concurrency, launchIntervalMs, mapper) {
    const results = new Array(items.length);
    let nextIndex = 0;
    let launchChain = Promise.resolve();

    async function waitForSlot() {
      const previous = launchChain;
      let release;
      launchChain = new Promise(function(resolve) { release = resolve; });
      await previous;
      await delay(launchIntervalMs);
      release();
    }

    async function worker() {
      while (true) {
        const idx = nextIndex;
        nextIndex += 1;
        if (idx >= items.length) return;
        await waitForSlot();
        try {
          results[idx] = await mapper(items[idx], idx);
        } catch (err) {
          results[idx] = null;
        }
      }
    }

    await Promise.all(Array.from({ length: Math.min(concurrency, items.length) }, worker));
    return results;
  }

  async function fetchKisProxyQuoteMap(codes) {
    const uniqueCodes = [...new Set(codes.filter(Boolean))];
    const rows = await mapWithRateLimit(
      uniqueCodes,
      KIS_PROXY_BATCH_CONCURRENCY,
      KIS_PROXY_LAUNCH_INTERVAL_MS,
      async function(code) {
        const payload = await fetchKisProxyJson('/v1/stocks/' + encodeURIComponent(code) + '/quote');
        return [code, parseKisProxyQuote(payload)];
      },
    );
    return new Map(rows.filter(Boolean));
  }

  function parseKisProxyQuote(payload) {
    const summary = payload?.summary || {};
    const raw = payload?.raw || {};
    const price = parseRawNumber(summary.current_price ?? raw.stck_prpr);
    const change = parseRawNumber(summary.change ?? raw.prdy_vrss);
    const previousPrice = parseRawNumber(raw.stck_sdpr) || (price != null && change != null ? price - change : null);
    return {
      price,
      previousPrice,
      changePct: parseRawNumber(summary.change_rate ?? raw.prdy_ctrt),
    };
  }

  async function loadHoldingConfigMap() {
    if (holdingConfigPromise) return holdingConfigPromise;
    holdingConfigPromise = fetch('config.json?t=' + Date.now(), { cache: 'no-store' })
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function(config) {
        holdingConfigById = new Map();
        config.forEach(function(entry) {
          if (!entry.id) return;
          holdingConfigById.set(entry.id, entry);
          if (entry.holdingTicker) {
            holdingCodeById[entry.id] = getTickerCode(entry.holdingTicker);
          }
        });
        return holdingConfigById;
      });
    return holdingConfigPromise;
  }

  async function buildLiveSnapshot() {
    const configMap = await loadHoldingConfigMap();
    const codes = [];
    pairs.filter(function(pair) { return !pair.isAverage; }).forEach(function(pair) {
      const config = configMap.get(pair.id);
      if (!config) return;
      if (isKoreanTicker(config.holdingTicker)) codes.push(getTickerCode(config.holdingTicker));
      (config.subsidiaries || []).forEach(function(sub) {
        if (isKoreanTicker(sub.ticker)) codes.push(getTickerCode(sub.ticker));
      });
    });

    const [quoteMap, market] = await Promise.all([
      fetchKisProxyQuoteMap(codes),
      buildLiveMarketSummary().catch(function() { return null; }),
    ]);
    const livePairs = [];
    pairs.filter(function(pair) { return !pair.isAverage; }).forEach(function(pair) {
      const config = configMap.get(pair.id);
      const entry = config ? buildLivePairEntry(pair, config, quoteMap) : null;
      if (entry) livePairs.push(entry);
    });
    if (!livePairs.length) throw new Error('KIS 프록시 현재가를 가져오지 못했습니다.');
    const averageRatio = livePairs.reduce(function(sum, pair) { return sum + pair.ratio; }, 0) / livePairs.length;
    const ratioChangePairs = livePairs.filter(function(pair) {
      return typeof pair.ratioChange === 'number' && Number.isFinite(pair.ratioChange);
    });
    const averageRatioChange = ratioChangePairs.length
      ? ratioChangePairs.reduce(function(sum, pair) { return sum + pair.ratioChange; }, 0) / ratioChangePairs.length
      : null;
    livePairs.push({
      id: '_average',
      ratio: +averageRatio.toFixed(2),
      ratioChange: averageRatioChange == null ? null : +averageRatioChange.toFixed(2),
      quoteSource: 'derived',
    });
    const now = new Date();
    return {
      source: 'KIS 프록시 실시간',
      lastUpdated: formatKstTimestamp(now),
      generatedAt: now.toISOString(),
      snapshotTimestamp: Date.now(),
      market,
      pairs: livePairs,
    };
  }

  async function buildLiveMarketSummary() {
    const [kospiPayload, kosdaqPayload] = await Promise.all([
      fetchKisProxyJson('/v1/indexes/KOSPI/quote'),
      fetchKisProxyJson('/v1/indexes/KOSDAQ/quote').catch(function() { return null; }),
    ]);
    const kospi = parseKisProxyIndex(kospiPayload, 'KOSPI', 'KOSPI');
    const kosdaq = parseKisProxyIndex(kosdaqPayload, 'KOSDAQ', 'KOSDAQ');
    if (!kospi) return null;
    if (kosdaq) kospi.extras = [kosdaq];
    return kospi;
  }

  function parseKisProxyIndex(payload, id, name) {
    const summary = payload?.summary || {};
    const raw = payload?.raw || {};
    const price = parseRawNumber(summary.current_price ?? raw.bstp_nmix_prpr);
    if (price == null) return null;
    return {
      id,
      name,
      price,
      change: parseRawNumber(summary.change ?? raw.bstp_nmix_prdy_vrss),
      changePct: parseRawNumber(summary.change_rate ?? raw.bstp_nmix_prdy_ctrt),
      source: 'KIS proxy',
      priceDecimals: 2,
    };
  }

  function buildLivePairEntry(pair, config, quoteMap) {
    const holdingCode = getTickerCode(config.holdingTicker);
    const holdingQuote = quoteMap.get(holdingCode);
    if (!holdingQuote || holdingQuote.price == null) return null;
    const adjustedShares = config.holdingAdjustedShares || ((config.holdingTotalShares || 0) - (config.holdingTreasuryShares || 0));
    if (!adjustedShares) return null;

    const marketCap = adjustedShares * holdingQuote.price;
    let holdingValue = 0;
    let previousHoldingValue = 0;
    let hasPreviousRatio = holdingQuote.previousPrice != null && holdingQuote.previousPrice !== 0;
    let usedFallback = false;
    const subDetails = [];
    const currentSubMap = new Map((pair.current.subsidiaries || []).map(function(sub) { return [sub.name, sub]; }));

    (config.subsidiaries || []).forEach(function(sub) {
      const quote = isKoreanTicker(sub.ticker) ? quoteMap.get(getTickerCode(sub.ticker)) : null;
      const fallback = currentSubMap.get(sub.name) || null;
      const fallbackPrice = fallback ? fallback.price : pair.current.subsidiaryPrice;
      const fallbackChange = fallback ? fallback.change : pair.current.subsidiaryChange;
      const price = quote && quote.price != null ? quote.price : fallbackPrice;
      if (price == null) return;
      const previousPrice = quote && quote.previousPrice != null
        ? quote.previousPrice
        : derivePreviousPrice(price, fallbackChange);
      if (!quote) usedFallback = true;

      const value = sub.sharesHeld * price;
      holdingValue += value;
      if (previousPrice == null) {
        hasPreviousRatio = false;
      } else {
        previousHoldingValue += sub.sharesHeld * previousPrice;
      }
      subDetails.push({
        name: sub.name,
        price: Math.round(price),
        change: quote && quote.changePct != null ? quote.changePct : fallbackChange,
        value: +(value / 1e8).toFixed(1),
        rawValue: value,
      });
    });

    if (!subDetails.length || !holdingValue || !marketCap) return null;
    const ratio = holdingValue / marketCap * 100;
    let previousRatio = null;
    if (hasPreviousRatio) {
      const previousMarketCap = adjustedShares * holdingQuote.previousPrice;
      if (previousMarketCap) previousRatio = previousHoldingValue / previousMarketCap * 100;
    }
    subDetails.forEach(function(sub) {
      sub.ratio = +(sub.rawValue / marketCap * 100).toFixed(2);
      delete sub.rawValue;
    });

    const entry = {
      id: pair.id,
      holdingPrice: Math.round(holdingQuote.price),
      holdingChange: holdingQuote.changePct,
      holdingValue: +(holdingValue / 1e8).toFixed(1),
      marketCap: +(marketCap / 1e8).toFixed(1),
      ratio: +ratio.toFixed(2),
      ratioChange: previousRatio != null ? +(ratio - previousRatio).toFixed(2) : null,
      quoteSource: usedFallback ? 'mixed' : 'kis_proxy_browser',
    };
    if (subDetails.length === 1) {
      entry.subsidiaryPrice = subDetails[0].price;
      entry.subsidiaryChange = subDetails[0].change;
    } else {
      entry.subsidiaries = subDetails;
    }
    return entry;
  }

  function derivePreviousPrice(price, changePct) {
    if (typeof price !== 'number' || !Number.isFinite(price)) return null;
    if (typeof changePct !== 'number' || !Number.isFinite(changePct)) return null;
    const denominator = 1 + changePct / 100;
    return denominator ? price / denominator : null;
  }

  function isKoreanTicker(ticker) {
    return /\.K[QS]$/.test(String(ticker || ''));
  }

  async function refreshLivePricesIfNeeded(baseSnapshot, opts) {
    opts = opts || {};
    const baseSnapshotMs = getSnapshotVersion(baseSnapshot);
    const referenceSnapshotMs = Math.max(baseSnapshotMs || 0, latestAppliedSnapshotMs || 0);
    if (!opts.forceRefresh && !isSnapshotMsStale(referenceSnapshotMs)) return false;
    if (liveRefreshPromise) return liveRefreshPromise;

    liveRefreshPromise = (async function() {
      try {
        const liveSnapshot = await runWithTimeout(
          buildLiveSnapshot(),
          LIVE_REFRESH_TIMEOUT_MS,
          '실시간 갱신 시간이 초과되었습니다.',
        );
        return applyCurrentData(liveSnapshot);
      } catch (err) {
        console.warn('브라우저 실시간 갱신 실패:', err);
        return false;
      } finally {
        liveRefreshPromise = null;
      }
    })();
    return liveRefreshPromise;
  }

  async function refreshLivePricesWithRetry(baseSnapshot, attempts, opts) {
    for (let attempt = 0; attempt < attempts; attempt += 1) {
      const refreshed = await refreshLivePricesIfNeeded(baseSnapshot, opts);
      if (refreshed || (!opts?.forceRefresh && !isSnapshotMsStale(latestAppliedSnapshotMs || 0))) {
        return refreshed;
      }
      if (attempt < attempts - 1) await delay(LIVE_REFRESH_RETRY_DELAY_MS);
    }
    return false;
  }
