  }

  // --- Stats ---
  function renderStats() {
    const p = pairs[selectedIdx];
    const hist = getFilteredHistory(p);
    const ratios = hist.map(h => h.ratio);
    const min = Math.min(...ratios);
    const max = Math.max(...ratios);
    const avg = ratios.reduce((a, b) => a + b, 0) / ratios.length;
    const current = p.current.ratio;

    // Percentile
    const sorted = [...ratios].sort((a, b) => a - b);
    const rank = sorted.filter(s => s <= current).length;
    const percentile = (rank / sorted.length * 100).toFixed(0);

    const statsEl = document.getElementById('statsRow');
    statsEl.innerHTML = `
      <div class="stat-box"><div class="label">현재 비율</div><div class="value">${current.toFixed(2)}%</div></div>
      <div class="stat-box"><div class="label">평균</div><div class="value">${avg.toFixed(2)}%</div></div>
      <div class="stat-box"><div class="label">최저</div><div class="value">${min.toFixed(2)}%</div></div>
      <div class="stat-box"><div class="label">최고</div><div class="value">${max.toFixed(2)}%</div></div>
      <div class="stat-box"><div class="label">백분위</div><div class="value">${percentile}%</div></div>
      <div class="stat-box"><div class="label">데이터 수</div><div class="value">${hist.length}일</div></div>
    `;
  }

  // --- Chart ---
  function renderChart() {
    const p = pairs[selectedIdx];
    document.getElementById('chartTitle').textContent = p.name + ' 비율 추이';
    const legendEl = document.getElementById('chartLegend');

    const canvas = document.getElementById('chart');
    const container = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = rect.height;

    const baseHist = filterHistoryByDays(p.history, periodDays);
    updateDataZoom('ratio', baseHist, ratioZoom);
    const hist = applyZoomToHistory(baseHist, ratioZoom);
    if (hist.length < 2) {
      renderChartLegend([], legendEl);
      return;
    }

    const stackedSubs = getStackedSubsidiarySeries(hist);
    const ratios = hist.map(h => h.ratio);
    const trendLines = buildRatioTrendLines(p.history, hist);
    const trendValues = [trendLines.sma.values, trendLines.ema.values]
      .flat()
      .filter(function(value) { return value !== null; });
    const rangeValues = ratios.concat(trendValues);
    const maxS = Math.max(...rangeValues);
    const isStacked = stackedSubs.length > 1;
    const minS = isStacked ? 0 : Math.min(...rangeValues);
    const chartPadding = Math.max(maxS - minS, maxS, 1) * 0.05;
    const chartMin = isStacked ? 0 : Math.min(minS, 100) - chartPadding;
    const chartMax = Math.max(maxS, 100) + chartPadding;
    const rangeS = chartMax - chartMin || 1;
    const avg = ratios.reduce((a, b) => a + b, 0) / ratios.length;

    const pad = { top: 20, right: 16, bottom: 36, left: 64 };
    const cW = W - pad.left - pad.right;
    const cH = H - pad.top - pad.bottom;
    const colors = getThemeColors();
    const palette = getStackPalette();
    const legendItems = buildChartLegendItems(stackedSubs, palette, colors);

    // Clear
    ctx.clearRect(0, 0, W, H);
    renderChartLegend(legendItems, legendEl);

    // Y axis grid
    ctx.strokeStyle = colors.grid;
    ctx.lineWidth = 1;
    const yTicks = 5;
    ctx.font = '12px -apple-system, sans-serif';
    ctx.fillStyle = colors.textDim;
    ctx.textAlign = 'right';
    for (let i = 0; i <= yTicks; i++) {
      const v = chartMin + (rangeS * i / yTicks);
      const y = pad.top + cH - (cH * i / yTicks);
      ctx.beginPath();
      ctx.moveTo(pad.left, y);
      ctx.lineTo(W - pad.right, y);
      ctx.stroke();
      ctx.fillText(v.toFixed(1) + '%', pad.left - 8, y + 4);
    }

    // 100% reference line
    if (100 >= chartMin && 100 <= chartMax) {
      const refY = pad.top + cH - ((100 - chartMin) / rangeS * cH);
      ctx.strokeStyle = colors.warnLine;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(pad.left, refY);
      ctx.lineTo(W - pad.right, refY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = colors.warnText;
      ctx.textAlign = 'left';
      ctx.fillText('100%', W - pad.right - 40, refY - 6);
    }

    // Average line
    const avgY = pad.top + cH - ((avg - chartMin) / rangeS * cH);
    ctx.strokeStyle = colors.avgLine;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(pad.left, avgY);
    ctx.lineTo(W - pad.right, avgY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = colors.avgText;
    ctx.textAlign = 'left';
    ctx.fillText('평균 ' + avg.toFixed(1) + '%', pad.left + 4, avgY - 6);

    // X axis labels
    ctx.fillStyle = colors.textDim;
    ctx.textAlign = 'center';
    const xLabelCount = Math.min(6, hist.length);
    for (let i = 0; i < xLabelCount; i++) {
      const idx = Math.floor(i * (hist.length - 1) / (xLabelCount - 1));
      const x = pad.left + (idx / (hist.length - 1)) * cW;
      ctx.fillText(hist[idx].date.slice(2), x, H - pad.bottom + 20);
    }

    if (isStacked) {
      drawStackedRatioChart(ctx, hist, stackedSubs, palette, colors, pad, cW, cH, chartMin, rangeS);
    } else {
      drawSingleRatioChart(ctx, hist, colors, pad, cW, cH, chartMin, rangeS);
    }

    drawTrendLine(ctx, hist, trendLines.sma.values, colors.smaLine, pad, cW, cH, chartMin, rangeS, [10, 6], 2);
    drawTrendLine(ctx, hist, trendLines.ema.values, colors.emaLine, pad, cW, cH, chartMin, rangeS, [], 2);

    // Tooltip interaction
    const tooltip = document.getElementById('tooltip');
    canvas.onmousemove = function(e) {
      const r = canvas.getBoundingClientRect();
      const mx = e.clientX - r.left;
      const my = e.clientY - r.top;
      if (mx < pad.left || mx > W - pad.right || my < pad.top || my > pad.top + cH) {
        tooltip.classList.remove('visible');
        return;
      }
      const ratio = (mx - pad.left) / cW;
      const idx = Math.round(ratio * (hist.length - 1));
      const d = hist[idx];
      if (!d) return;

      const dotX = pad.left + (idx / (hist.length - 1)) * cW;
      const dotY = pad.top + cH - ((d.ratio - chartMin) / rangeS * cH);

      let ttRows;
      if (p.isAverage) {
        ttRows = `<div class="tt-row"><span><strong>비율</strong></span><span><strong>${d.ratio.toFixed(2)}%</strong></span></div>`;
      } else if (Array.isArray(d.subsidiaries) && d.subsidiaries.length > 1) {
        ttRows = `<div class="tt-row"><span>${p.holdingName}</span><span>${formatPrice(d.holdingPrice)}</span></div>`;
        d.subsidiaries.forEach(function(sub) {
          ttRows += `<div class="tt-row"><span>${sub.name}</span><span>${formatRatio(sub.ratio)}</span></div>`;
        });
        ttRows += `<div class="tt-row"><span><strong>총 비율</strong></span><span><strong>${d.ratio.toFixed(2)}%</strong></span></div>`;
      } else {
        ttRows = `<div class="tt-row"><span>${p.holdingName}</span><span>${formatPrice(d.holdingPrice)}</span></div>`;
        if (d.subsidiaryPrice) {
          ttRows += `<div class="tt-row"><span>${p.subsidiaryName}</span><span>${formatPrice(d.subsidiaryPrice)}</span></div>`;
        }
        ttRows += `<div class="tt-row"><span>보유지분가치</span><span>${formatOk(d.holdingValue)}</span></div>
           <div class="tt-row"><span>조정시가총액</span><span>${formatOk(d.marketCap)}</span></div>
           <div class="tt-row"><span><strong>비율</strong></span><span><strong>${d.ratio.toFixed(2)}%</strong></span></div>`;
      }

      tooltip.innerHTML = `
        <div class="tt-date">${d.date}</div>
        ${ttRows}
      `;

      let tx = dotX + 12;
      let ty = dotY - 80;
      tooltip.style.left = '0px';
      tooltip.style.top = '0px';
      tooltip.classList.add('visible');
      const ttWidth = tooltip.offsetWidth || 210;
      const ttHeight = tooltip.offsetHeight || 80;
      if (tx + ttWidth + 12 > W) tx = dotX - ttWidth - 12;
      ty = dotY - ttHeight - 12;
      if (ty < 0) ty = dotY + 12;
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
    };
    canvas.onmouseleave = function() {
      tooltip.classList.remove('visible');
    };
  }

  // --- Period buttons ---
  function bindPeriodBtns() {
    document.getElementById('periodBtns').addEventListener('click', function(e) {
      if (e.target.tagName !== 'BUTTON') return;
      this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      periodDays = parseInt(e.target.dataset.days);
      resetZoomState(ratioZoom);
      renderChart();
      renderStats();
    });
  }

  // --- Price Chart ---
  function renderPriceChart() {
    const p = pairs[selectedIdx];
    const section = document.getElementById('priceChartSection');
    if (p.isAverage) {
      section.style.display = 'none';
      return;
    }
    section.style.display = '';
    document.getElementById('priceChartTitle').textContent = p.holdingName + ' 주가 추이';

    const canvas = document.getElementById('priceChart');
    const container = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = rect.height;

    const baseHist = filterHistoryByDays(p.history, pricePeriodDays);
    updateDataZoom('price', baseHist, priceZoom);
    const hist = applyZoomToHistory(baseHist, priceZoom);
    if (hist.length < 2) return;

    const prices = hist.map(h => h.holdingPrice);
    const minP = Math.min(...prices);
    const maxP = Math.max(...prices);
    const chartMin = minP - (maxP - minP) * 0.05;
    const chartMax = maxP + (maxP - minP) * 0.05;
    const rangeP = chartMax - chartMin || 1;

    const pad = { top: 20, right: 16, bottom: 36, left: 80 };
    const cW = W - pad.left - pad.right;
    const cH = H - pad.top - pad.bottom;
    const colors = getThemeColors();

    ctx.clearRect(0, 0, W, H);

    // Y axis grid
    ctx.strokeStyle = colors.grid;
    ctx.lineWidth = 1;
    const yTicks = 5;
    ctx.font = '12px -apple-system, sans-serif';
    ctx.fillStyle = colors.textDim;
    ctx.textAlign = 'right';
    for (let i = 0; i <= yTicks; i++) {
      const v = chartMin + (rangeP * i / yTicks);
      const y = pad.top + cH - (cH * i / yTicks);
      ctx.beginPath();
      ctx.moveTo(pad.left, y);
      ctx.lineTo(W - pad.right, y);
      ctx.stroke();
      ctx.fillText(Math.round(v).toLocaleString('ko-KR'), pad.left - 8, y + 4);
    }

    // X axis labels
    ctx.fillStyle = colors.textDim;
    ctx.textAlign = 'center';
    const xLabelCount = Math.min(6, hist.length);
    for (let i = 0; i < xLabelCount; i++) {
      const idx = Math.floor(i * (hist.length - 1) / (xLabelCount - 1));
      const x = pad.left + (idx / (hist.length - 1)) * cW;
      ctx.fillText(hist[idx].date.slice(2), x, H - pad.bottom + 20);
    }

    // Price change color
    const priceUp = prices[prices.length - 1] >= prices[0];
    const lineColor = priceUp ? colors.up : colors.down;
    const fillStart = priceUp ? colors.priceUpFillStart : colors.priceDownFillStart;
    const fillEnd = priceUp ? colors.priceUpFillEnd : colors.priceDownFillEnd;

    // Gradient fill
    const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + cH);
    gradient.addColorStop(0, fillStart);
    gradient.addColorStop(1, fillEnd);

    ctx.beginPath();
    for (let i = 0; i < hist.length; i++) {
      const x = pad.left + (i / (hist.length - 1)) * cW;
      const y = pad.top + cH - ((hist[i].holdingPrice - chartMin) / rangeP * cH);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.lineTo(pad.left + cW, pad.top + cH);
    ctx.lineTo(pad.left, pad.top + cH);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();

    // Line
    ctx.beginPath();
    for (let i = 0; i < hist.length; i++) {
      const x = pad.left + (i / (hist.length - 1)) * cW;
      const y = pad.top + cH - ((hist[i].holdingPrice - chartMin) / rangeP * cH);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.stroke();

    // Tooltip
    const tooltip = document.getElementById('priceTooltip');
    canvas.onmousemove = function(e) {
      const r = canvas.getBoundingClientRect();
      const mx = e.clientX - r.left;
      const my = e.clientY - r.top;
      if (mx < pad.left || mx > W - pad.right || my < pad.top || my > pad.top + cH) {
        tooltip.classList.remove('visible');
        return;
      }
      const ratio = (mx - pad.left) / cW;
      const idx = Math.round(ratio * (hist.length - 1));
      const d = hist[idx];
      if (!d) return;

      const dotX = pad.left + (idx / (hist.length - 1)) * cW;
      const dotY = pad.top + cH - ((d.holdingPrice - chartMin) / rangeP * cH);

      const change = idx > 0 ? d.holdingPrice - hist[idx - 1].holdingPrice : 0;
      const changePct = idx > 0 ? (change / hist[idx - 1].holdingPrice * 100) : 0;
      const changeDir = change >= 0 ? 'up' : 'down';
      const arrow = change >= 0 ? '▲' : '▼';

      tooltip.innerHTML = `
        <div class="tt-date">${d.date}</div>
        <div class="tt-row"><span>${p.holdingName}</span><span>${formatPrice(d.holdingPrice)}</span></div>
        <div class="tt-row"><span>전일 대비</span><span class="${changeDir}-color">${arrow} ${Math.abs(changePct).toFixed(2)}%</span></div>
      `;

      let tx = dotX + 12;
      let ty = dotY - 60;
      if (tx + 210 > W) tx = dotX - 210;
      if (ty < 0) ty = dotY + 12;
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
      tooltip.classList.add('visible');
    };
    canvas.onmouseleave = function() {
      tooltip.classList.remove('visible');
    };
  }

  function bindPricePeriodBtns() {
    document.getElementById('pricePeriodBtns').addEventListener('click', function(e) {
      if (e.target.tagName !== 'BUTTON') return;
      this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      pricePeriodDays = parseInt(e.target.dataset.days);
      resetZoomState(priceZoom);
      renderPriceChart();
    });
  }

  function createZoomState() {
    return { start: 0, end: 1 };
  }

  function resetZoomState(zoom) {
    zoom.start = 0;
    zoom.end = 1;
  }

  function normalizeZoomState(zoom) {
    if (!Number.isFinite(zoom.start)) zoom.start = 0;
    if (!Number.isFinite(zoom.end)) zoom.end = 1;
    zoom.start = clamp(zoom.start, 0, 1);
    zoom.end = clamp(zoom.end, 0, 1);
    if (zoom.end < zoom.start) {
      const tmp = zoom.start;
      zoom.start = zoom.end;
      zoom.end = tmp;
    }
    if (zoom.end - zoom.start < MIN_ZOOM_SPAN) {
      const center = (zoom.start + zoom.end) / 2;
      zoom.start = clamp(center - MIN_ZOOM_SPAN / 2, 0, 1 - MIN_ZOOM_SPAN);
      zoom.end = zoom.start + MIN_ZOOM_SPAN;
    }
  }

  function applyZoomToHistory(hist, zoom) {
    if (!hist || hist.length < 3) return hist || [];
    normalizeZoomState(zoom);
    if (zoom.start <= 0 && zoom.end >= 1) return hist;
    const lastIdx = hist.length - 1;
    let startIdx = Math.floor(zoom.start * lastIdx);
    let endIdx = Math.ceil(zoom.end * lastIdx);
    if (endIdx <= startIdx) endIdx = Math.min(lastIdx, startIdx + 1);
    return hist.slice(startIdx, endIdx + 1);
  }

  function bindDataZoomControls() {
    ['ratio', 'price'].forEach(function(type) {
      const root = document.getElementById(type + 'DataZoom');
      if (!root) return;
      const track = root.querySelector('.data-zoom-track');
      const selection = root.querySelector('.data-zoom-selection');
      if (!track || !selection) return;

      track.addEventListener('pointerdown', function(e) {
        if (root.classList.contains('disabled')) return;
        const zoom = getZoomState(type);
        normalizeZoomState(zoom);

        const rect = track.getBoundingClientRect();
        const startPoint = clamp((e.clientX - rect.left) / rect.width, 0, 1);
        const targetHandle = e.target && e.target.dataset ? e.target.dataset.handle : '';
        const mode = targetHandle || (selection.contains(e.target) ? 'pan' : 'center');
        const initialStart = zoom.start;
        const initialEnd = zoom.end;
        const span = initialEnd - initialStart;

        selection.classList.add('dragging');
        track.setPointerCapture(e.pointerId);

        const move = function(ev) {
          const point = clamp((ev.clientX - rect.left) / rect.width, 0, 1);
          if (mode === 'start') {
            zoom.start = clamp(point, 0, initialEnd - MIN_ZOOM_SPAN);
          } else if (mode === 'end') {
            zoom.end = clamp(point, initialStart + MIN_ZOOM_SPAN, 1);
          } else {
            const center = mode === 'center' ? point : ((initialStart + initialEnd) / 2) + (point - startPoint);
            zoom.start = clamp(center - span / 2, 0, 1 - span);
            zoom.end = zoom.start + span;
          }
          normalizeZoomState(zoom);
          renderZoomedChart(type);
        };

        const up = function(ev) {
          selection.classList.remove('dragging');
          try {
            track.releasePointerCapture(ev.pointerId);
          } catch (err) {}
          track.removeEventListener('pointermove', move);
          track.removeEventListener('pointerup', up);
          track.removeEventListener('pointercancel', up);
        };

        track.addEventListener('pointermove', move);
        track.addEventListener('pointerup', up);
        track.addEventListener('pointercancel', up);
        move(e);
      });

      track.addEventListener('dblclick', function() {
        resetZoomState(getZoomState(type));
        renderZoomedChart(type);
      });
    });
  }

  function renderZoomedChart(type) {
    if (type === 'ratio') {
      renderChart();
      renderStats();
    } else {
      renderPriceChart();
    }
  }

  function getZoomState(type) {
    return type === 'ratio' ? ratioZoom : priceZoom;
  }

  function updateDataZoom(type, baseHist, zoom) {
    const root = document.getElementById(type + 'DataZoom');
    if (!root) return;
    const selection = root.querySelector('.data-zoom-selection');
    const startLabel = root.querySelector('[data-zoom-start]');
    const summaryLabel = root.querySelector('[data-zoom-summary]');
    const endLabel = root.querySelector('[data-zoom-end]');
    const disabled = !baseHist || baseHist.length < 3;

    root.classList.toggle('disabled', disabled);
    if (disabled) {
      if (selection) {
        selection.style.left = '0%';
        selection.style.width = '100%';
      }
      if (startLabel) startLabel.textContent = '';
      if (summaryLabel) summaryLabel.textContent = '';
      if (endLabel) endLabel.textContent = '';
      return;
    }

    normalizeZoomState(zoom);
    const startPct = zoom.start * 100;
    const endPct = zoom.end * 100;
    const visibleHist = applyZoomToHistory(baseHist, zoom);
    if (selection) {
      selection.style.left = startPct.toFixed(2) + '%';
      selection.style.width = Math.max(0, endPct - startPct).toFixed(2) + '%';
    }
    if (startLabel) startLabel.textContent = visibleHist[0].date;
    if (summaryLabel) {
      const isFull = zoom.start <= 0.001 && zoom.end >= 0.999;
      summaryLabel.textContent = isFull ? '전체 구간' : visibleHist.length.toLocaleString('ko-KR') + '개 포인트';
    }
    if (endLabel) endLabel.textContent = visibleHist[visibleHist.length - 1].date;
  }

  function bindThemeToggle() {
    const toggle = document.getElementById('themeToggle');
    updateThemeButtons();
    if (!toggle) return;
    toggle.addEventListener('click', toggleTheme);
  }

  function toggleTheme() {
    const theme = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
    applyTheme(theme === 'dark' ? 'light' : 'dark', true);
  }

  function getFilteredPriceHistory(pair) {
    return applyZoomToHistory(filterHistoryByDays(pair.history, pricePeriodDays), priceZoom);
  }

  // --- Helpers ---
  function clamp(value, min, max) {
    return Math.min(Math.max(value, min), max);
  }

  function getStackedSubsidiarySeries(hist) {
    const sample = hist.find(function(entry) {
      return Array.isArray(entry.subsidiaries) && entry.subsidiaries.length > 1;
    });
    if (!sample) return [];
    return sample.subsidiaries.map(function(sub) {
      return { name: sub.name };
    });
  }

  function getInitialSelectedIdx() {
    if (!initialCode) return 0;
    const normalized = initialCode.toUpperCase();
    const idx = pairs.findIndex(function(pair) {
      if (pair.isAverage) return false;
      const code = resolvePairCode(pair).toUpperCase();
      return code === normalized || pair.id === initialCode;
    });
    return idx >= 0 ? idx : 0;
  }

  function setSelectedIdx(idx, opts) {
    opts = opts || {};
    selectedIdx = idx;
    renderTodayOverview();
    renderCards();
    renderChart();
    renderPriceChart();
    renderStats();
    if (opts.syncUrl) syncSelectedCodeToUrl();
    if (opts.scroll) scrollToRatioChart();
  }

  function syncSelectedCodeToUrl() {
    const pair = pairs[selectedIdx];
    const url = new URL(location.href);
    const code = pair ? resolvePairCode(pair) : '';
    if (pair && !pair.isAverage && code) {
      url.searchParams.set('code', code);
    } else {
      url.searchParams.delete('code');
    }
    history.replaceState(null, '', url.toString());
  }

  function scrollToRatioChart() {
    const section = document.getElementById('ratioChartSection');
    if (!section) return;
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function resolveSelectionFromQuery() {
    if (!initialCode) return;
    const idx = findPairIndexByCode(initialCode);
    if (idx >= 0) {
      if (idx !== selectedIdx) {
        setSelectedIdx(idx);
      }
      requestAnimationFrame(function() {
        scrollToRatioChart();
      });
      return;
    }
    loadHoldingCodes().then(function() {
      const resolvedIdx = findPairIndexByCode(initialCode);
      if (resolvedIdx < 0) return;
      setSelectedIdx(resolvedIdx);
      requestAnimationFrame(function() {
        scrollToRatioChart();
      });
    }).catch(function(err) {
      console.warn('종목 코드 매핑 로드 실패:', err);
    });
  }

  function findPairIndexByCode(code) {
    const normalized = (code || '').trim().toUpperCase();
    if (!normalized) return -1;
    return pairs.findIndex(function(pair) {
      if (pair.isAverage) return false;
      return resolvePairCode(pair).toUpperCase() === normalized || pair.id === code;
    });
  }

  function buildHoldingCodeMapFromPairs() {
    const map = {};
    pairs.forEach(function(pair) {
      if (pair.holdingTicker) {
        map[pair.id] = pair.holdingTicker.split('.')[0];
      }
    });
    return map;
  }

  function loadHoldingCodes() {
    if (holdingCodePromise) return holdingCodePromise;
    holdingCodePromise = fetch('config.json')
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function(config) {
        config.forEach(function(entry) {
          if (!entry.id || !entry.holdingTicker) return;
          holdingCodeById[entry.id] = entry.holdingTicker.split('.')[0];
        });
        return holdingCodeById;
      });
    return holdingCodePromise;
  }

  function resolvePairCode(pair) {
    if (!pair || pair.isAverage) return '';
    if (pair.holdingTicker) return pair.holdingTicker.split('.')[0];
    return holdingCodeById[pair.id] || '';
  }

  function getFilteredHistory(pair) {
    return applyZoomToHistory(filterHistoryByDays(pair.history, periodDays), ratioZoom);
  }

  function filterHistoryByDays(hist, days) {
    if (days === 0 || hist.length < 2) return hist;
    const latest = parseDateKey(hist[hist.length - 1].date);
    latest.setDate(latest.getDate() - days);
    const cutoff = formatDateKey(latest);
    const filtered = hist.filter(h => h.date >= cutoff);
    return filtered.length >= 2 ? filtered : hist;
  }

  function parseDateKey(dateStr) {
    const parts = dateStr.split('-').map(Number);
    return new Date(parts[0], parts[1] - 1, parts[2]);
  }

  function formatDateKey(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + d;
  }

  function loadTheme() {
    return localStorage.getItem('theme') || 'light';
  }

  function applyTheme(theme, persist) {
    const nextTheme = theme === 'light' ? 'light' : 'dark';
    document.documentElement.dataset.theme = nextTheme;
    if (persist) localStorage.setItem('theme', nextTheme);
    updateThemeButtons();
    if (hasRendered) {
      renderChart();
      renderPriceChart();
    }
  }

  function updateThemeButtons() {
    const theme = document.documentElement.dataset.theme || 'light';
    const button = document.getElementById('themeToggle');
    if (!button) return;
    button.setAttribute('aria-label', theme === 'dark' ? '일반 모드로 전환' : '다크 모드로 전환');
    button.title = '테마 전환';
  }

  function getThemeColors() {
    const styles = getComputedStyle(document.documentElement);
    return {
      accent: styles.getPropertyValue('--accent').trim(),
      up: styles.getPropertyValue('--up').trim(),
      down: styles.getPropertyValue('--down').trim(),
      text: styles.getPropertyValue('--text').trim(),
      textDim: styles.getPropertyValue('--text-dim').trim(),
      grid: styles.getPropertyValue('--grid').trim(),
      warnLine: styles.getPropertyValue('--warn-line').trim(),
      warnText: styles.getPropertyValue('--warn-text').trim(),
      avgLine: styles.getPropertyValue('--avg-line').trim(),
      avgText: styles.getPropertyValue('--avg-text').trim(),
      smaLine: styles.getPropertyValue('--sma-line').trim(),
      emaLine: styles.getPropertyValue('--ema-line').trim(),
      ratioFillStart: styles.getPropertyValue('--ratio-fill-start').trim(),
      ratioFillEnd: styles.getPropertyValue('--ratio-fill-end').trim(),
      priceUpFillStart: styles.getPropertyValue('--price-up-fill-start').trim(),
      priceUpFillEnd: styles.getPropertyValue('--price-up-fill-end').trim(),
      priceDownFillStart: styles.getPropertyValue('--price-down-fill-start').trim(),
      priceDownFillEnd: styles.getPropertyValue('--price-down-fill-end').trim(),
    };
  }

  function getStackPalette() {
    if ((document.documentElement.dataset.theme || 'dark') === 'light') {
      return ['#2d66d6', '#1f9b57', '#d1433f', '#b7791f', '#7c4dff', '#118ab2'];
    }
    return ['#6c8cff', '#38c96a', '#f0615e', '#f5a623', '#8a63ff', '#4dc7ff'];
  }

  function buildChartLegendItems(series, palette, colors) {
    const items = [];
    if (series && series.length > 1) {
      series.forEach(function(sub, idx) {
        items.push({
          label: sub.name,
          color: palette[idx % palette.length]
        });
      });
      items.push({ label: '총 비율', color: colors.text });
    } else {
      items.push({ label: '비율', color: colors.accent });
    }
    items.push({ label: '전체 평균', color: colors.avgLine });
    items.push({ label: 'SMA 250일', color: colors.smaLine });
    items.push({ label: 'EMA α=0.1', color: colors.emaLine });
    return items;
  }

  function renderChartLegend(items, el) {
    if (!el) return;
    if (!items || items.length === 0) {
      el.innerHTML = '';
      return;
    }
    el.innerHTML = items.map(function(item) {
      return `<span class="chart-legend-item"><span class="legend-swatch" style="background:${item.color}"></span>${item.label}</span>`;
    }).join('');
  }

  function buildRatioTrendLines(fullHist, visibleHist) {
    const hasPrecomputed = visibleHist.some(function(entry) {
      return typeof entry.sma250 === 'number' || typeof entry.ema01 === 'number';
    });

    if (hasPrecomputed) {
      return {
        sma: {
          values: visibleHist.map(function(entry) {
            return typeof entry.sma250 === 'number' ? entry.sma250 : null;
          })
        },
        ema: {
          values: visibleHist.map(function(entry) {
            return typeof entry.ema01 === 'number' ? entry.ema01 : null;
          })
        }
      };
    }

    const alpha = 0.1;
    const smaByDate = new Map();
    const emaByDate = new Map();
    let rollingSum = 0;
    let ema = null;

    fullHist.forEach(function(entry, idx) {
      const ratio = entry.ratio;
      rollingSum += ratio;
      if (idx >= 250) {
        rollingSum -= fullHist[idx - 250].ratio;
      }
      smaByDate.set(entry.date, idx >= 249 ? rollingSum / 250 : null);
      ema = ema === null ? ratio : (alpha * ratio) + ((1 - alpha) * ema);
      emaByDate.set(entry.date, ema);
    });

    return {
      sma: {
        values: visibleHist.map(function(entry) {
          return smaByDate.has(entry.date) ? smaByDate.get(entry.date) : null;
        })
      },
      ema: {
        values: visibleHist.map(function(entry) {
          return emaByDate.has(entry.date) ? emaByDate.get(entry.date) : null;
        })
      }
    };
  }

  function drawSingleRatioChart(ctx, hist, colors, pad, cW, cH, chartMin, rangeS) {
    const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + cH);
    gradient.addColorStop(0, colors.ratioFillStart);
    gradient.addColorStop(1, colors.ratioFillEnd);

    ctx.beginPath();
    for (let i = 0; i < hist.length; i++) {
      const x = pad.left + (i / (hist.length - 1)) * cW;
      const y = pad.top + cH - ((hist[i].ratio - chartMin) / rangeS * cH);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    const lastX = pad.left + cW;
    ctx.lineTo(lastX, pad.top + cH);
    ctx.lineTo(pad.left, pad.top + cH);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();

    ctx.beginPath();
    for (let i = 0; i < hist.length; i++) {
      const x = pad.left + (i / (hist.length - 1)) * cW;
      const y = pad.top + cH - ((hist[i].ratio - chartMin) / rangeS * cH);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = colors.accent;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  function drawStackedRatioChart(ctx, hist, series, palette, colors, pad, cW, cH, chartMin, rangeS) {
    let cumulative = new Array(hist.length).fill(0);
    series.forEach(function(sub, subIdx) {
      const color = palette[subIdx % palette.length];
      const nextCumulative = hist.map(function(entry, idx) {
        const contribution = entry.subsidiaries && entry.subsidiaries[subIdx] ? entry.subsidiaries[subIdx].ratio : 0;
        return cumulative[idx] + contribution;
      });

      ctx.beginPath();
      for (let i = 0; i < hist.length; i++) {
        const x = pad.left + (i / (hist.length - 1)) * cW;
        const y = pad.top + cH - ((nextCumulative[i] - chartMin) / rangeS * cH);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      for (let i = hist.length - 1; i >= 0; i--) {
        const x = pad.left + (i / (hist.length - 1)) * cW;
        const y = pad.top + cH - ((cumulative[i] - chartMin) / rangeS * cH);
        ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = withAlpha(color, 0.22);
      ctx.fill();

      ctx.beginPath();
      for (let i = 0; i < hist.length; i++) {
        const x = pad.left + (i / (hist.length - 1)) * cW;
        const y = pad.top + cH - ((nextCumulative[i] - chartMin) / rangeS * cH);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = withAlpha(color, 0.9);
      ctx.lineWidth = 1.2;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.stroke();

      cumulative = nextCumulative;
    });

    ctx.beginPath();
    for (let i = 0; i < hist.length; i++) {
      const x = pad.left + (i / (hist.length - 1)) * cW;
      const y = pad.top + cH - ((hist[i].ratio - chartMin) / rangeS * cH);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = colors.text;
    ctx.lineWidth = 1.5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  function drawTrendLine(ctx, hist, values, color, pad, cW, cH, chartMin, rangeS, dash, lineWidth) {
    if (!values || values.every(function(value) { return value === null; })) {
      return;
    }

    ctx.save();
    ctx.beginPath();
    let hasStarted = false;
    for (let i = 0; i < hist.length; i++) {
      const value = values[i];
      if (value === null) {
        hasStarted = false;
        continue;
      }
      const x = pad.left + (i / (hist.length - 1)) * cW;
      const y = pad.top + cH - ((value - chartMin) / rangeS * cH);
      if (!hasStarted) {
        ctx.moveTo(x, y);
        hasStarted = true;
      } else {
        ctx.lineTo(x, y);
      }
    }
    ctx.setLineDash(dash || []);
    ctx.strokeStyle = color;
    ctx.lineWidth = lineWidth || 2;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();
  }

  function withAlpha(color, alpha) {
    const hex = color.replace('#', '');
    if (hex.length !== 6) return color;
    const r = parseInt(hex.slice(0, 2), 16);
    const g = parseInt(hex.slice(2, 4), 16);
    const b = parseInt(hex.slice(4, 6), 16);
    return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
  }

  function formatPrice(n) {
    if (typeof n !== 'number' || !Number.isFinite(n)) return '-';
    if (Math.abs(n) >= 100000000) {
      return (n / 100000000).toLocaleString('ko-KR', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      }) + '억';
    }
    return n.toLocaleString('ko-KR', { maximumFractionDigits: 0 });
  }

  function formatOk(n) {
    if (typeof n !== 'number' || !Number.isFinite(n)) return '-';
    return n.toLocaleString('ko-KR') + '억';
  }

  function formatRatio(n) {
    return typeof n === 'number' && Number.isFinite(n) ? n.toFixed(2) + '%' : '-';
  }

  // Resize
  window.addEventListener('resize', () => { renderChart(); renderPriceChart(); });
})();
</script>
