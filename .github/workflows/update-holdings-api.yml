name: Update Holdings API

on:
  push:
    paths:
      - config.json
      - build_holdings_api.py
      - .github/workflows/update-holdings-api.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build holdings API
        run: python build_holdings_api.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet api/holdings.json || {
            git add api/holdings.json
            git commit -m "자동 업데이트: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M') 지주사 API 갱신"
            git push
          }
