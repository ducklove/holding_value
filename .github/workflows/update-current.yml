name: Update Current Prices

on:
  schedule:
    # KRX session every 10 minutes (09:00-15:59 KST).
    - cron: '*/10 0-6 * * 1-5'
    # US night-sensitive holdings every 30 minutes (21:00-05:30 KST).
    - cron: '0,30 12-20 * * 1-5'
    # One final post-session refresh around 06:00 KST.
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch current prices
        run: python fetch_current.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet current.js 2>/dev/null || {
            git add current.js
            git commit -m "실시간 업데이트: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M') 현재가 갱신"
            git push
          }
