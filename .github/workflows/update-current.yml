name: Update Current Prices

on:
  schedule:
    # Server snapshot safety net every 10 minutes on weekdays.
    # Browser refresh follows common_preferred_spread and refreshes visible tabs every 5 minutes.
    - cron: '2/10 * * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-current-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch current prices
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_TOKEN_PATH: ${{ runner.temp }}/kis_token.json
          KIS_PROXY_REQUEST_INTERVAL: "0.7"
        run: python fetch_current.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet current.js current.json 2>/dev/null || {
            git add current.js current.json
            git commit -m "Update current prices ($(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M'))"
            git push
          }
