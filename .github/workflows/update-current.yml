name: Update Current Prices

on:
  schedule:
    # KRX 장중 10분 간격 (09:00~15:30 KST = 00:00~06:30 UTC), 월~금
    - cron: '*/10 0-6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch current prices
        run: python fetch_current.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet current.js 2>/dev/null || {
            git add current.js
            git commit -m "실시간 업데이트: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M') 현재가 갱신"
            git push
          }
