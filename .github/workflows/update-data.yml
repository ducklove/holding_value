name: Update Stock Data

on:
  schedule:
    # Daily 05:00 KST refresh.
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: Run a full rebuild instead of the incremental update
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch data
        env:
          FULL_REBUILD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.full_rebuild || 'false' }}
        run: |
          if [ "$FULL_REBUILD" = "true" ]; then
            python fetch_data.py --full
          else
            python fetch_data.py
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data.js || {
            git add data.js
            git commit -m "자동 업데이트: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M') 데이터 갱신"
            git push
          }
